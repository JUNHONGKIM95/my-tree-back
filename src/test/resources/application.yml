spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:mytree;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false
    username: sa
    password:
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.example.mytree.domain,com.example.mytree.dto
  configuration:
    map-underscore-to-camel-case: true
